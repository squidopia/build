<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Circuit Sim - V3</title>
<style>
    body { margin: 0; background: #0b0e14; color: #e0e6ed; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
    #toolbar {
        position: fixed; top: 20px; left: 20px; background: rgba(26, 29, 36, 0.95);
        backdrop-filter: blur(10px); padding: 12px; border-radius: 12px;
        display: flex; flex-direction: column; gap: 8px; border: 1px solid #30363d;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 10;
    }
    button {
        background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
        padding: 10px 15px; border-radius: 6px; cursor: pointer;
        transition: all 0.1s; font-weight: bold; text-align: left;
    }
    button:hover { background: #30363d; border-color: #8b949e; }
    button.active { background: #238636; color: white; border-color: #2ea043; box-shadow: 0 0 15px rgba(35, 134, 54, 0.4); }
    .hint { position: fixed; bottom: 20px; left: 20px; color: #8b949e; font-size: 0.85rem; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 5px; }
</style>
</head>
<body>

<div id="toolbar">
    <button data-tool="wire" class="active">Line Wire</button>
    <button data-tool="cross">Cross Wire</button>
    <button data-tool="battery">Battery</button>
    <button data-tool="switch">Switch</button>
    <button data-tool="push_button">Button</button>
    <button data-tool="light">Light Bulb</button>
    <button data-tool="press" style="color: #4cafef;">👆 Press Tool</button>
    <button data-tool="power" style="color: #ffca28;">⚡ Power Tool</button>
    <hr style="width:100%; border:0; border-top:1px solid #30363d; margin: 5px 0;">
    <button data-tool="delete" style="color: #ff7b72;">Delete</button>
</div>

<div class="hint">Left Click/Drag: Place | <b>'R': Rotate Ghost</b> | Right Drag: Pan | Press Tool: Click Switch/Hold Button</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gridSize = 40;
let camera = { x: 0, y: 0, zoom: 1 };
let tool = "wire";
let grid = {};
let ghostRotation = 0;

let mouseWorld = { x: 0, y: 0 };
let isRightDragging = false;
let isLeftDragging = false;
let lastMouse = { x: 0, y: 0 };

document.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => {
        tool = btn.dataset.tool;
        document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    };
});

window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'r') ghostRotation = (ghostRotation + 1) % 4;
});

class Cell {
    constructor(type, rot = 0) {
        this.type = type;
        this.power = 0;
        this.nextPower = 0;
        this.rotation = rot;
        this.state = false; // For switch toggle or button hold
    }
}

function key(x, y) { return `${x},${y}`; }
function getCell(x, y) { return grid[key(x,y)]; }

// --- Input Handling ---

canvas.addEventListener("mousedown", e => {
    if (e.button === 0) {
        isLeftDragging = true;
        handleAction();
    }
    if (e.button === 2) isRightDragging = true;
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
});

window.addEventListener("mouseup", e => {
    if (e.button === 0) {
        isLeftDragging = false;
        // Release all buttons when mouse is up
        for(let k in grid) if(grid[k].type === "push_button") grid[k].state = false;
    }
    if (e.button === 2) isRightDragging = false;
});

canvas.addEventListener("mousemove", e => {
    if (isRightDragging) {
        camera.x += e.clientX - lastMouse.x;
        camera.y += e.clientY - lastMouse.y;
    }
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;

    let rect = canvas.getBoundingClientRect();
    mouseWorld.x = (e.clientX - rect.left - camera.x) / camera.zoom;
    mouseWorld.y = (e.clientY - rect.top - camera.y) / camera.zoom;

    if (isLeftDragging) handleAction();
});

function handleAction() {
    let gx = Math.floor(mouseWorld.x / gridSize);
    let gy = Math.floor(mouseWorld.y / gridSize);

    if (tool === "delete") {
        delete grid[key(gx, gy)];
    } else if (tool === "press") {
        let cell = getCell(gx, gy);
        if (cell) {
            if (cell.type === "switch" && !isLeftDragging) cell.state = !cell.state; // Only toggle once
            if (cell.type === "push_button") cell.state = true;
        }
    } else if (tool !== "power" && tool !== "press") {
        grid[key(gx, gy)] = new Cell(tool, ghostRotation);
    }
}

// Custom click for toggle-only logic
canvas.addEventListener("click", e => {
    if (tool === "press") {
        let gx = Math.floor(mouseWorld.x / gridSize);
        let gy = Math.floor(mouseWorld.y / gridSize);
        let cell = getCell(gx, gy);
        if (cell && cell.type === "switch") cell.state = !cell.state;
    }
});

canvas.addEventListener("contextmenu", e => e.preventDefault());

canvas.addEventListener("wheel", e => {
    camera.zoom *= e.deltaY < 0 ? 1.1 : 1/1.1;
}, {passive: true});

// --- Simulation Logic ---

let lastSimTime = 0;
const SIM_SPEED = 60; 

function updatePhysics(timestamp) {
    if (timestamp - lastSimTime < SIM_SPEED) return;
    lastSimTime = timestamp;

    for (let k in grid) {
        let cell = grid[k];
        let [x,y] = k.split(",").map(Number);
        
        // Default: Lose power unless source exists
        cell.nextPower = 0;

        if (cell.type === "battery") cell.nextPower = 1;
        if (cell.type === "switch" && cell.state) cell.nextPower = 1;
        if (cell.type === "push_button" && cell.state) cell.nextPower = 1;
        if (tool === "power" && Math.floor(mouseWorld.x/gridSize) === x && Math.floor(mouseWorld.y/gridSize) === y) cell.nextPower = 1;
    }

    // Propagation pass
    for (let k in grid) {
        let [x,y] = k.split(",").map(Number);
        let cell = grid[k];
        if (cell.power === 1) {
            let neighbors = getConnectedNeighbors(x, y, cell);
            neighbors.forEach(nPos => {
                let neighbor = getCell(nPos.x, nPos.y);
                if (neighbor && canAcceptPower(nPos.dx, nPos.dy, neighbor)) neighbor.nextPower = 1;
            });
        }
    }
    for (let k in grid) grid[k].power = grid[k].nextPower;
}

function getConnectedNeighbors(x, y, cell) {
    let dirs = [[1,0], [-1,0], [0,1], [0,-1]];
    if (cell.type === "wire") dirs = (cell.rotation % 2 === 0) ? [[1,0], [-1,0]] : [[0,1], [0,-1]];
    return dirs.map(d => ({ x: x + d[0], y: y + d[1], dx: d[0], dy: d[1] }));
}

function canAcceptPower(dx, dy, neighbor) {
    if (neighbor.type !== "wire") return true;
    return (dy === 0 && neighbor.rotation % 2 === 0) || (dx === 0 && neighbor.rotation % 2 !== 0);
}

// --- Rendering ---

function draw(timestamp) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    updatePhysics(timestamp);

    ctx.save();
    ctx.translate(camera.x, camera.y);
    ctx.scale(camera.zoom, camera.zoom);

    // Draw Grid
    ctx.strokeStyle = "#161b22"; ctx.lineWidth = 1 / camera.zoom;
    for (let i = -100; i < 100; i++) {
        ctx.beginPath(); ctx.moveTo(i*gridSize, -2000); ctx.lineTo(i*gridSize, 2000); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2000, i*gridSize); ctx.lineTo(2000, i*gridSize); ctx.stroke();
    }

    // Ghost Preview
    if (tool !== "delete" && tool !== "press" && tool !== "power") {
        ctx.globalAlpha = 0.3;
        renderCell(Math.floor(mouseWorld.x / gridSize), Math.floor(mouseWorld.y / gridSize), {type: tool, rotation: ghostRotation, power: 0, state: false});
        ctx.globalAlpha = 1.0;
    }

    for (let k in grid) {
        let [x,y] = k.split(",").map(Number);
        renderCell(x, y, grid[k]);
    }

    ctx.restore();
    requestAnimationFrame(draw);
}

function renderCell(x, y, cell) {
    let px = x * gridSize, py = y * gridSize;
    let activeColor = "#4cafef", inactiveColor = "#30363d";
    ctx.save();
    ctx.translate(px + gridSize/2, py + gridSize/2);
    
    if (cell.type === "wire" || cell.type === "cross") {
        if(cell.type === "wire") ctx.rotate(cell.rotation * Math.PI/2);
        ctx.strokeStyle = cell.power ? activeColor : inactiveColor;
        ctx.lineWidth = 4; ctx.beginPath();
        ctx.moveTo(-gridSize/2, 0); ctx.lineTo(gridSize/2, 0);
        if(cell.type === "cross") { ctx.moveTo(0, -gridSize/2); ctx.lineTo(0, gridSize/2); }
        ctx.stroke();
        if(cell.power) { ctx.shadowBlur = 10; ctx.shadowColor = activeColor; ctx.stroke(); }
    } else if (cell.type === "battery") {
        ctx.fillStyle = "#ff7b72"; ctx.shadowBlur = 15; ctx.shadowColor = "#ff7b72";
        ctx.fillRect(-12, -12, 24, 24); ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.fillText("+", 0, 5);
    } else if (cell.type === "light") {
        ctx.fillStyle = cell.power ? "#f9e053" : "#161b22";
        if(cell.power) { ctx.shadowBlur = 25; ctx.shadowColor = "#f9e053"; }
        ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#8b949e"; ctx.stroke();
    } else if (cell.type === "switch" || cell.type === "push_button") {
        ctx.fillStyle = "#21262d"; ctx.fillRect(-14,-14,28,28);
        ctx.strokeStyle = cell.state ? "#2ea043" : "#8b949e";
        ctx.lineWidth = 2; ctx.strokeRect(-14,-14,28,28);
        ctx.fillStyle = cell.state ? "#2ea043" : "#30363d";
        ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

requestAnimationFrame(draw);
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
