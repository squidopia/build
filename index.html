<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gridSize = 40;
let camera = { x: 0, y: 0, zoom: 1 };
let tool = "wire";
let grid = {};
let ghostRotation = 0;
let mouseWorld = { x: 0, y: 0 };
let isRightDragging = false;
let isLeftDragging = false;
let lastMouse = { x: 0, y: 0 };

// --- Persistence ---
function saveGrid() {
    localStorage.setItem('neon_circuit_grid', JSON.stringify(grid));
}

function loadGrid() {
    const data = localStorage.getItem('neon_circuit_grid');
    if (data) grid = JSON.parse(data);
}
loadGrid();

// --- Level Import / Export ---
function exportLevel() {
    let clean = {};
    for (let k in grid) {
        let c = grid[k];
        clean[k] = {
            type: c.type,
            rotation: c.rotation,
            state: c.state,
            power: c.power
        };
    }
    return btoa(JSON.stringify(clean));
}

function importLevel(code) {
    try {
        let data = JSON.parse(atob(code));
        grid = {};

        for (let k in data) {
            let c = data[k];
            let cell = new Cell(c.type, c.rotation);
            cell.state = c.state || false;
            cell.power = c.power || 0;
            grid[k] = cell;
        }

        saveGrid();
    } catch (e) {
        alert("❌ Invalid level code!");
    }
}

// --- UI ---
document.getElementById('wipe').onclick = () => {
    if (confirm("Clear everything?")) {
        grid = {};
        saveGrid();
    }
};

document.querySelectorAll("button[data-tool]").forEach(btn => {
    btn.onclick = () => {
        tool = btn.dataset.tool;
        document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    };
});

document.getElementById("levelCode").onclick = () => {
    let choice = prompt("Type 'export' or paste code:");

    if (choice === "export") {
        let code = exportLevel();
        prompt("Copy your level:", code);
    } else if (choice) {
        importLevel(choice);
    }
};

// --- Cell ---
class Cell {
    constructor(type, rot = 0) {
        this.type = type;
        this.power = 0;
        this.nextPower = 0;
        this.rotation = rot;
        this.state = false;
    }
}

function key(x, y) { return `${x},${y}`; }
function getCell(x, y) { return grid[key(x,y)]; }

// --- Input ---
canvas.addEventListener("mousedown", e => {
    if (e.button === 0) { isLeftDragging = true; handleAction(); }
    if (e.button === 2) isRightDragging = true;
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
});

window.addEventListener("mouseup", e => {
    if (e.button === 0) {
        isLeftDragging = false;
        for (let k in grid) {
            if (grid[k].type === "push_button") {
                grid[k].state = false;
            }
        }
    }
    if (e.button === 2) isRightDragging = false;
    saveGrid();
});

canvas.addEventListener("mousemove", e => {
    if (isRightDragging) {
        camera.x += e.clientX - lastMouse.x;
        camera.y += e.clientY - lastMouse.y;
    }

    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;

    let rect = canvas.getBoundingClientRect();
    mouseWorld.x = (e.clientX - rect.left - camera.x) / camera.zoom;
    mouseWorld.y = (e.clientY - rect.top - camera.y) / camera.zoom;

    if (isLeftDragging) handleAction();
});

function handleAction() {
    let gx = Math.floor(mouseWorld.x / gridSize);
    let gy = Math.floor(mouseWorld.y / gridSize);

    if (tool === "delete") {
        delete grid[key(gx, gy)];
        saveGrid();
    } else if (tool === "press") {
        let cell = getCell(gx, gy);
        if (cell) {
            if (cell.type === "switch") cell.state = !cell.state;
            if (cell.type === "push_button") cell.state = true;
        }
    } else if (tool !== "power" && tool !== "press") {
        grid[key(gx, gy)] = new Cell(tool, ghostRotation);
    }
}

canvas.addEventListener("contextmenu", e => e.preventDefault());

canvas.addEventListener("wheel", e => {
    const zoomFactor = e.deltaY < 0 ? 1.05 : 1 / 1.05;
    camera.zoom *= zoomFactor;
    camera.zoom = Math.min(3, Math.max(0.3, camera.zoom));
}, { passive: true });

// --- Simulation ---
let lastSimTime = 0;
const SIM_SPEED = 60;

function updatePhysics(timestamp) {
    if (timestamp - lastSimTime < SIM_SPEED) return;
    lastSimTime = timestamp;

    // Reset
    for (let k in grid) {
        grid[k].nextPower = 0;
    }

    // Sources
    for (let k in grid) {
        let cell = grid[k];

        if (cell.type === "battery") cell.nextPower = 1;
        if (cell.type === "switch" && cell.state) cell.nextPower = 1;
        if (cell.type === "push_button" && cell.state) cell.nextPower = 1;
    }

    // Gates
    for (let k in grid) {
        let cell = grid[k];
        let [x, y] = k.split(",").map(Number);

        if (cell.type.startsWith("gate_")) {
            let inputs = getGateInputs(x, y, cell);

            if (cell.type === "gate_and") cell.nextPower = inputs.every(p => p) ? 1 : 0;
            if (cell.type === "gate_or") cell.nextPower = inputs.some(p => p) ? 1 : 0;
            if (cell.type === "gate_not") cell.nextPower = inputs.some(p => p) ? 0 : 1;
        }
    }

    // Propagation (loop-safe)
    let visited = new Set();

    function spread(x, y) {
        let k = key(x, y);
        if (visited.has(k)) return;
        visited.add(k);

        let cell = getCell(x, y);
        if (!cell || cell.power !== 1) return;

        let neighbors = getConnectedNeighbors(x, y, cell);

        neighbors.forEach(n => {
            let neighbor = getCell(n.x, n.y);
            if (neighbor && canAcceptPower(n.dx, n.dy, neighbor)) {
                if (neighbor.nextPower !== 1) {
                    neighbor.nextPower = 1;
                    spread(n.x, n.y);
                }
            }
        });
    }

    for (let k in grid) {
        let [x, y] = k.split(",").map(Number);
        if (grid[k].power === 1) spread(x, y);
    }

    // Apply
    for (let k in grid) {
        grid[k].power = grid[k].nextPower;
    }

    // Reset buttons
    for (let k in grid) {
        if (grid[k].type === "push_button") {
            grid[k].state = false;
        }
    }
}

// --- Helpers ---
function getGateInputs(x, y, cell) {
    let dirs = [
        {x:1,y:0}, {x:-1,y:0}, {x:0,y:1}, {x:0,y:-1}
    ];

    let output = getConnectedNeighbors(x, y, cell)[0];

    return dirs
        .filter(d => !(d.x === output.dx && d.y === output.dy))
        .map(d => {
            let n = getCell(x + d.x, y + d.y);
            return n && n.power === 1;
        });
}

function getConnectedNeighbors(x, y, cell) {
    let dirs = [[1,0],[-1,0],[0,1],[0,-1]];

    if (cell.type === "wire") {
        dirs = (cell.rotation % 2 === 0) ? [[1,0],[-1,0]] : [[0,1],[0,-1]];
    }

    if (cell.type.startsWith("gate_")) {
        let r = cell.rotation;
        dirs = [r===0?[1,0]:r===1?[0,1]:r===2?[-1,0]:[0,-1]];
    }

    return dirs.map(d => ({ x: x + d[0], y: y + d[1], dx: d[0], dy: d[1] }));
}

function canAcceptPower(dx, dy, neighbor) {
    if (neighbor.type === "wire") {
        return (dy === 0 && neighbor.rotation % 2 === 0) ||
               (dx === 0 && neighbor.rotation % 2 !== 0);
    }
    return true;
}

// --- Render ---
function draw(timestamp) {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    updatePhysics(timestamp);

    ctx.save();
    ctx.translate(camera.x, camera.y);
    ctx.scale(camera.zoom, camera.zoom);

    // Grid
    ctx.strokeStyle = "#161b22";
    ctx.lineWidth = 1 / camera.zoom;

    for (let i = -50; i < 50; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, -2000);
        ctx.lineTo(i * gridSize, 2000);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-2000, i * gridSize);
        ctx.lineTo(2000, i * gridSize);
        ctx.stroke();
    }

    // Ghost
    if (tool !== "delete" && tool !== "press" && tool !== "power") {
        ctx.globalAlpha = 0.3;
        renderCell(
            Math.floor(mouseWorld.x / gridSize),
            Math.floor(mouseWorld.y / gridSize),
            { type: tool, rotation: ghostRotation, power: 0 }
        );
        ctx.globalAlpha = 1;
    }

    // Cells
    for (let k in grid) {
        let [x,y] = k.split(",").map(Number);
        renderCell(x, y, grid[k]);
    }

    ctx.restore();
    requestAnimationFrame(draw);
}

function renderCell(x, y, cell) {
    let px = x * gridSize;
    let py = y * gridSize;

    ctx.save();
    ctx.translate(px + gridSize/2, py + gridSize/2);

    let active = "#4cafef";
    let inactive = "#30363d";

    if (cell.type === "wire") {
        ctx.rotate(cell.rotation * Math.PI/2);
        ctx.strokeStyle = cell.power ? active : inactive;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-gridSize/2, 0);
        ctx.lineTo(gridSize/2, 0);
        ctx.stroke();
    }

    else if (cell.type.startsWith("gate_")) {
        ctx.fillStyle = "#21262d";
        ctx.fillRect(-15,-15,30,30);
        ctx.strokeStyle = cell.power ? active : "#8b949e";
        ctx.strokeRect(-15,-15,30,30);
        ctx.fillStyle = "white";
        ctx.font = "9px Arial";
        ctx.textAlign = "center";
        ctx.fillText(cell.type.replace("gate_","").toUpperCase(), 0, 4);
    }

    else if (cell.type === "battery") {
        ctx.fillStyle = "#ff7b72";
        ctx.fillRect(-12,-12,24,24);
        ctx.fillStyle = "white";
        ctx.fillText("+", 0, 5);
    }

    else if (cell.type === "light") {
        ctx.fillStyle = cell.power ? "#f9e053" : "#161b22";
        ctx.beginPath();
        ctx.arc(0,0,12,0,Math.PI*2);
        ctx.fill();
    }

    ctx.restore();
}

requestAnimationFrame(draw);

window.onresize = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
};
</script>
